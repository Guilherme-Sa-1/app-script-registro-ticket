<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNX</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul class="tabs">
            <li class="tab select" id="tab-cadastro">Cadastro</li>
            <li class="tab" id="tab-metricas">Métricas</li>
        </ul>
        
        <div class="agente">
            <img src="src/images/foto-perfil.jpg" alt="Foto do agente" width="40" height="40">
            <h3>Nome do Agente</h3>
        </div>
    </nav>

    <main>
        <div class="tela1" id="aba-cadastro">
            <h2>Registrar Atendimento</h2>
            
            <div>
                <label for="link-ticket">Link:</label>
                <input type="url" id="link-ticket" name="link-ticket" placeholder="Cole o link aqui">
            </div>
            
            <div>
                <label for="status-ticket">Status:</label>
                <select id="status-ticket" name="status-ticket">
                    <option value="resolvido">Resolvido</option>
                    <option value="aguardando">Aguardando resposta</option>
                    <option value="aberto">Em aberto</option>
                </select>
            </div>
            
            <button type="button">Registrar</button>
        </div>

        <div class="tela2" id="aba-metricas" style="display: none;">
            <h2>Dashboard</h2>
            
            <div class="filtros">
                <label for="filtro-status">Mostrar:</label>
                <select id="filtro-status">
                    <option value="geral">Geral</option>
                    <option value="resolvidos">Resolvidos</option>
                    <option value="aberto">Em aberto</option>
                    <option value="aguardando">Aguardando resposta</option>
                </select>
            </div>

            <div class="resumo-dados">
                <p>Feitos nesta hora: <strong>0</strong></p>
                <p>Média do Expediente (Resolvidos/Hora): <strong>0</strong></p>
            </div>

            <div class="area-graficos">
                <div class="grafico-velocimetro">
                    <h3>Média por Hora</h3>
                    <div class="placeholder">[Desenho do Velocímetro aqui]</div>
                </div>

                <div class="grafico-linha-tempo">
                    <h3>Produção Hora a Hora</h3>
                    <div class="placeholder">[Gráfico de barras/linhas do expediente aqui]</div>
                </div>
            </div>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
